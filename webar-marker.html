<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marcador Hiro</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #151713;
        --muted: #62665e;
        --accent: #d95646;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        background: #f4f2ec;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        width: min(92vw, 760px);
        padding: 2rem 1rem;
        text-align: center;
      }

      img {
        display: block;
        width: min(84vw, 520px);
        aspect-ratio: 1;
        margin: 0 auto 1.25rem;
        border: 12px solid #fff;
        background: #fff;
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.18);
      }

      h1 {
        margin: 0 0 0.45rem;
        font-size: clamp(1.4rem, 4vw, 2.4rem);
      }

      p {
        max-width: 35rem;
        margin: 0.3rem auto;
        color: var(--muted);
        font-weight: 700;
        line-height: 1.45;
      }

      strong {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <img
        alt="Marcador Hiro para WebAR"
        src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png"
      />
      <h1>Marcador Hiro</h1>
      <p>Muestra este marcador en la Mac o imprimelo. Apunta la camara del iPhone hacia el marcador.</p>
      <p><strong>Mantenlo bien iluminado</strong> y evita reflejos para que el retrato se ancle mejor.</p>
    </main>
  </body>
</html>
