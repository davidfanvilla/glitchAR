<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Retrato WebAR</title>
    <link rel="stylesheet" href="./webar.css" />
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body>
    <div class="hud">
      <strong>Retrato WebAR</strong>
      <span id="webar-status">Cargando camara</span>
      <a href="./webar-marker.html" target="_blank" rel="noreferrer">Abrir marcador</a>
    </div>

    <canvas id="hand-canvas" aria-hidden="true"></canvas>

    <a-scene
      embedded
      renderer="alpha: true; antialias: true; logarithmicDepthBuffer: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
    >
      <a-marker id="hiro-marker" preset="hiro" fold-portrait>
        <a-entity light="type: ambient; intensity: 1.2"></a-entity>
        <a-entity light="type: directional; intensity: 1.6" position="0 2 1"></a-entity>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script type="module" src="./webar.js"></script>
  </body>
</html>
