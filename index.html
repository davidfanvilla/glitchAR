<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Retrato plegable con mano</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div id="scene" class="scene" aria-label="Retrato 3D interactivo"></div>

        <aside class="studio-card" id="work" aria-label="Deteccion de manos">
          <div class="camera-preview" aria-label="Vista de deteccion de mano">
            <img
              id="portrait-preview"
              src="data:image/gif;base64,R0lGODlhAQABAAAAACw="
              alt="Foto original del retrato"
            />
            <video id="hand-video" autoplay muted playsinline></video>
            <canvas id="hand-canvas"></canvas>
            <span id="hand-status">Listo</span>
          </div>
          <div class="controls">
            <button id="start-camera" type="button">Detectar mano</button>
          </div>
        </aside>

        <aside class="code-panel" aria-label="Codigo en tiempo real">
          <div class="code-panel__bar">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <pre><code id="live-code"></code></pre>
        </aside>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
